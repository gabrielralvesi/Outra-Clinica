        const SessionActions = {
            toggleDid(sessionId) {
                const updated = Sessions.toggleDid(sessionId);
                if (updated) {
                    this.refreshAll();
                    Utils.showAlert("✅ Sessão atualizada!", "success");
                }
            },

            togglePaid(sessionId) {
                const updated = Sessions.togglePaid(sessionId);
                if (updated) {
                    this.refreshAll();
                    Utils.showAlert("💰 Status de pagamento atualizado!", "success");
                }
            },

            editValue(sessionId) {
                const session = Sessions.getById(sessionId);
                if (!session) return;
                
                const newValue = prompt("Novo valor (R$):", session.value);
                if (newValue !== null) {
                    const updated = Sessions.updateValue(sessionId, Utils.parseMoney(newValue));
                    if (updated) {
                        this.refreshAll();
                        Utils.showAlert("✅ Valor atualizado!", "success");
                    }
                }
            },

            delete(sessionId) {
                if (!confirm("Excluir esta sessão?")) return;
                
                Sessions.delete(sessionId);
                Tokens.deleteBySession(sessionId);
                
                this.refreshAll();
                Utils.showAlert("🗑️ Sessão excluída!", "success");
            },

            add() {
                const date = $("date")?.value;
                const patientId = $("pPatient")?.value;
                const time = $("pTime")?.value;
                const did = $("pDid")?.value;
                const just = $("pJust")?.value;
                const paid = $("pPaid")?.value;
                const manualValue = $("pValue")?.value;

                if (!date || !patientId) {
                    Utils.showAlert("❌ Selecione data e paciente", "error");
                    return;
                }

                const p = Patients.getById(patientId);
                let value = manualValue ? Utils.parseMoney(manualValue) : Patients.getDefaultValue(patientId);

                const session = {
                    id: Utils.uid(),
                    date, patientId, time,
                    did: did,
                    just: did === "nao" ? (just === "na" ? "nao_justificada" : just) : "na",
                    paid, value
                };

                Sessions.add(session);

                if (p?.serviceType === "cassems") {
                    Tokens.register(session.id, {
                        sessionId: session.id,
                        date: date,
                        patientName: p.name,
                        code: '',
                        status: 'pendente'
                    });
                }

                $("pTime").value = "";
                $("pValue").value = "";
                
                this.refreshAll();
                Utils.showAlert("✅ Sessão adicionada!", "success");
            },

            refreshAll() {
                DailyView.render();
                DashboardView.render();
                ScheduleView.render();
                if (openedPatientId) PatientsView.openFolder(openedPatientId);
            }
        };

        const PatientActions = {
            add() {
                const name = $("cName")?.value.trim();
                if (!name) {
                    Utils.showAlert("❌ Nome é obrigatório", "error");
                    return;
                }

                const phone = $("cPhone")?.value || "";
                const serviceType = $("cServiceType")?.value || "particular";
                const value = Utils.parseMoney($("cValue")?.value);
                
                const startDate = $("cStartDate")?.value || Utils.todayISO();
                const endDate = $("cEndDate")?.value || Utils.addDays(Utils.todayISO(), 30);

                const horarios = ScheduleForm.coletarHorarios();
                
                const patient = Patients.add({
                    name,
                    phone,
                    serviceType,
                    defaultValue: value,
                    horarios: horarios,
                    startDate,
                    endDate,
                    notes: $("cNotes")?.value || ""
                });

                if (horarios.length > 0) {
                    horarios.forEach(h => {
                        Schedule.addRecurring(h.dia, h.horario, patient.id, patient.serviceType);
                    });
                }

                if (currentPhotoFile) {
                    Photos.set(patient.id, currentPhotoFile);
                }

                this.clearForm();
                this.refreshAll();
                Utils.showAlert(`✅ Paciente ${name} cadastrado!`, "success");
            },

            rename() {
                const patients = Patients.getAll();
                const idx = patients.findIndex(p => p.id === openedPatientId);
                
                if (idx >= 0) {
                    const newName = prompt("Novo nome:", patients[idx].name);
                    if (newName) {
                        Patients.update(openedPatientId, { name: newName.trim() });
                        PatientsView.openFolder(openedPatientId);
                        this.refreshAll();
                        Utils.showAlert("✅ Nome atualizado!", "success");
                    }
                }
            },

            delete() {
                if (!confirm("Excluir paciente e todo histórico?")) return;
                
                Patients.delete(openedPatientId);
                
                const sessions = Sessions.getAll().filter(s => s.patientId !== openedPatientId);
                Sessions.save(sessions);
                
                Schedule.removeByPatient(openedPatientId);
                Photos.remove(openedPatientId);
                
                const evolucoes = Evolucoes.getAll();
                delete evolucoes[openedPatientId];
                Evolucoes.save(evolucoes);

                PatientsView.closeFolder();
                this.refreshAll();
                Utils.showAlert("🗑️ Paciente excluído!", "success");
            },

            openAnamnese() { Modals.openAnamnese(); },
            saveAnamnese() { Modals.saveAnamnese(); },

            openWhatsApp() {
                const p = Patients.getById(openedPatientId);
                if (p?.phone) {
                    window.open(`https://wa.me/55${p.phone}`, "_blank");
                } else {
                    Utils.showAlert("❌ Sem WhatsApp", "error");
                }
            },

            sendBirthdayMessage(patientId) {
                const p = Patients.getById(patientId);
                if (p?.phone) {
                    const msg = encodeURIComponent(`🎂 Feliz aniversário! Desejo um dia maravilhoso e muitas realizações!`);
                    window.open(`https://wa.me/55${p.phone}?text=${msg}`, "_blank");
                }
            },

            handlePhotoUpload(input) {
                const file = input.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPhotoFile = e.target.result;
                    const preview = $("photoPreview");
                    const placeholder = $("photoPlaceholder");
                    if (preview) {
                        preview.src = e.target.result;
                        preview.classList.remove("hidden");
                    }
                    if (placeholder) {
                        placeholder.classList.add("hidden");
                    }
                };
                reader.readAsDataURL(file);
            },

                $("cName").value = "";
                $("cPhone").value = "";
                $("cValue").value = "";
                $("cNotes").value = "";
                $("cStartDate").value = Utils.todayISO();

                PatientsView.renderFolders();

        const ScheduleActions = {
            handleSlotClick(day, time) {
                const current = Schedule.getByDayTime(day, time);
                const patients = Patients.getAll();

                if (current) {
                    this.handleRemoveSlot(day, time, current);
                } else {
                    this.handleAddSlot(day, time, patients);
                }
            },

            handleRemoveSlot(day, time, current) {
                const patient = Patients.getById(current.patientId);
                if (confirm(`Remover ${patient?.name} deste horário?`)) {
                    Schedule.removeRecurring(day, time);
                    this.refreshAll();
                    Utils.showAlert("✅ Horário liberado!", "success");
                }
            },

            handleAddSlot(day, time, patients) {
                const patientList = patients.map((p, i) => `${i + 1} - ${p.name}`).join("\n");
                const choice = prompt(
                    `Agendar em ${DAYS[day]} às ${time}\n\n` +
                    `Digite o NÚMERO do paciente:\n${patientList}\n\n` +
                    `Ou 0 para cancelar`
                );

                if (choice && choice !== "0") {
                    const idx = parseInt(choice) - 1;
                    if (idx >= 0 && idx < patients.length) {
                        const patient = patients[idx];
                        Schedule.addRecurring(day, time, patient.id, patient.serviceType);
                        this.refreshAll();
                        Utils.showAlert(`✅ ${patient.name} agendado!`, "success");
                    }
                }
            },

            addTime() {
                const time = $("newTime")?.value.trim();
                if (!time) return;
                
                if (!/^\d{1,2}:\d{2}$/.test(time)) {
                    Utils.showAlert("❌ Formato inválido. Use HH:MM", "error");
                    return;
                }

                if (Schedule.addTime(time)) {
                    ScheduleView.render();
                    Utils.showAlert(`✅ Horário ${time} adicionado!`, "success");
                }
                
                $("newTime").value = "";
            },

            refreshAll() {
                ScheduleView.render();
                DashboardView.render();
            }

                    const btn = $(id);

                            case "f": e.preventDefault();

                                break;
                            case "1": e.preventDefault(); Tabs.set("dashboard"); break;
                            case "2": e.preventDefault(); Tabs.set("daily"); break;

                    const quantidade = tipo === "pack4" ? 1 : 2;
                    for (let i = 0; i < quantidade; i++) {
                        const diaSelect = document.querySelector(`.dia-semana-${i}`);

                        if (diaSelect && horarioInput && diaSelect.value) {

                            });

                            });

                                        <div id="photoPlaceholder" class="photo-placeholder">📷</div>
                                        <input type="file" id="patientPhoto" accept="image/*" style="display:none;" onchange="PatientActions.handlePhotoUpload(this)" />
                                        <button class="small" onclick="document.getElementById('patientPhoto').click()">📸 Escolher foto</button>
                                    </div>

                                    <div class="grid2">
                                        <div>
                                            <label>Nome completo *</label>
                                            <input id="cName" placeholder="João Silva" />
                                        </div>
                                        <div>
                                            <label>WhatsApp</label>
                                            <input id="cPhone" placeholder="67999999999" />
                                        </div>
                                    </div>

                                    <div class="grid2">
                                        <div>
                                            <label>Convênio</label>
                                            <select id="cServiceType">
                                                <option value="particular">Particular</option>
                                                <option value="cassems">Cassems</option>
                                                <option value="unimed">Unimed</option>
                                                <option value="outros">Outros</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label>Valor padrão (R$)</label>
                                            <input id="cValue" placeholder="80,00" />
                                        </div>
                                    </div>

                                    <div class="grid2">
                                        <div>
                                            <label>Pacote</label>
                                            <select id="cBillingType" onchange="ScheduleForm.updateDays()">
                                                <option value="pack4">4 sessões</option>
                                                <option value="pack8">8 sessões</option>
                                                <option value="individual">Individual</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label>&nbsp;</label>
                                            <input type="text" readonly style="background:transparent; border:none;" />
                                        </div>
                                    </div>

                                    <div style="margin:15px 0;">
                                        <label>📅 Período</label>
                                        <div class="grid2">
                                            <div>
                                                <input type="date" id="cStartDate" />
                                                <small class="muted">Início</small>
                                            </div>
                                            <div>
                                                <input type="date" id="cEndDate" />
                                                <small class="muted">Término</small>
                                            </div>
                                        </div>
                                    </div>

                                    <div style="margin:15px 0;">
                                        <label>📆 Horários das sessões</label>
                                        <div id="horariosContainer"></div>
                                        <small class="muted">Esses horários serão automaticamente agendados</small>
                                    </div>

                                    <label style="margin-top:15px;">Observações</label>
                                    <textarea id="cNotes" rows="2" placeholder="Observações relevantes..."></textarea>

                                    <div style="margin-top:15px;">
                                        <button class="primary" onclick="PatientActions.add()" style="width:100%;">💾 Salvar Paciente</button>
                                    </div>
                                </div>

                                <div class="card">
                                    <div id="foldersPane">
                                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                            <b>📁 Pastas de Pacientes</b>
                                            <div style="display:flex; gap:8px;">
                                                <input id="pSearch" placeholder="Buscar..." style="width:200px;" oninput="PatientsView.renderFolders()" />
                                                <button id="onlyDebtFolders" class="small" onclick="PatientsView.toggleDebtFilter()">💸 Com débito</button>
                                            </div>
                                        </div>
                                        <div id="patientFolders" class="list"></div>
                                    </div>

                                    <div id="folderOpenPane" class="hidden">
                                        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:15px;">
                                            <button id="backToFolders" class="small" onclick="PatientsView.closeFolder()">← Voltar</button>
                                            <img id="folderPatientPhoto" class="photo-preview small hidden" src="" alt="" />
                                            <div style="flex:1;">
                                                <b id="openPatientTitle">Paciente</b>
                                                <div class="muted" id="openPatientMeta"></div>
                                            </div>
                                            <div id="patientActionButtons" style="display:flex; gap:8px;"></div>
                                        </div>

                                        <div id="pacoteProgresso" style="margin:10px 0;"></div>
                                        
                                        <div style="margin-top:20px;">
                                            <h3>📋 Histórico de Sessões</h3>
                                            <div id="patientHistory" class="list"></div>
                                        </div>

                                        <div style="margin-top:30px;" id="evolucoesSection"></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Agendamento -->
                        <section id="viewSchedule" class="card hidden">
                            <div class="row">
                                <div>
                                    <label>Data referência</label>
                                    <input id="schedRef" type="date" onchange="ScheduleView.render()" />
                                </div>
                                <div>
                                    <label>Adicionar horário</label>
                                    <div style="display:flex; gap:8px;">
                                        <input id="newTime" placeholder="07:00" />
                                        <button id="addTime" class="small primary" onclick="ScheduleActions.addTime()">➕</button>
                                    </div>
                                </div>
                                <div>
                                    <label>Filtro</label>
                                    <div style="display:flex; gap:5px;">
                                        <button id="filterHoje" class="small" onclick="ScheduleView.filterHoje()">Hoje</button>
                                        <button id="filterAmanha" class="small" onclick="ScheduleView.filterAmanha()">Amanhã</button>
                                        <button id="filterSemana" class="small" onclick="ScheduleView.filterSemana()">Semana</button>
                                    </div>
                                </div>
                            </div>

                            <div class="schedWrap">
                                <table class="sched" id="schedTable"></table>
                            </div>

                            <div class="muted" style="margin-top:15px; padding:10px; background:rgba(255,255,255,.03); border-radius:12px;">
                                <span class="pill ok">🟢 Cassems</span>
                                <span class="pill warn">🟡 Particular</span>
                                <span class="pill info">🔵 Unimed/Outros</span>
                                <span class="pill bad">🔴 Vago</span>
                                <span class="pill token">🎫 Token</span>
                                <span class="pill">📊 Contador de sessões</span>
                            </div>
                        </section>

                        <!-- Relatórios -->
                        <section id="viewReports" class="card hidden">
                            <h2 style="margin-bottom:20px;">📈 Relatórios</h2>

                            <div class="grid2">
                                <div class="cardMini">
                                    <b>Resumo do Mês</b>
                                    <div id="monthSummary" class="muted" style="margin-top:10px;">Carregando...</div>
                                </div>
                                <div class="cardMini">
                                    <b>Taxa de Faltas</b>
                                    <div id="absenceRate" class="muted" style="margin-top:10px;">Carregando...</div>
                                </div>
                                <div class="cardMini">
                                    <b>Faturamento</b>
                                    <div id="revenueStats" class="muted" style="margin-top:10px;">Carregando...</div>
                                </div>
                                <div class="cardMini">
                                    <b>Pacientes Ativos</b>
                                    <div id="activePatients" class="muted" style="margin-top:10px;">Carregando...</div>
                                </div>
                            </div>

                            <div style="margin-top:20px;">
                                <b>🎫 Controle de Tokens Cassems</b>
                                <div class="grid3" style="margin-top:10px;">
                                    <div class="cardMini">
                                        <b>Total de sessões Cassems</b>
                                        <div id="totalSessoesCassems" class="stat-value" style="font-size:1.5rem;">0</div>
                                    </div>
                                    <div class="cardMini">
                                        <b>Tokens Enviados</b>
                                        <div id="totalTokensEnviados" class="stat-value" style="font-size:1.5rem; color:#2C7A5A;">0</div>
                                    </div>
                                    <div class="cardMini">
                                        <b>Tokens Pendentes</b>
                                        <div id="totalTokensPendentes" class="stat-value" style="font-size:1.5rem; color:#E8C66A;">0</div>
                                    </div>
                                </div>
                            </div>

                            <div style="margin-top:20px;">
                                <b>Pacientes com maior débito</b>
                                <div id="topDebtors" class="list" style="margin-top:10px;"></div>
                            </div>
                        </section>
                    </main>

                    <div class="shortcuts-hint" id="shortcutsHint" onclick="Shortcuts.togglePanel()">⌨️ Atalhos</div>
                    <div class="shortcuts-panel hidden" id="shortcutsPanel">
                        <h4 style="margin-bottom:10px;">Atalhos de Teclado</h4>
                        <div class="shortcut-item"><span>Novo paciente</span> <span class="shortcut-key">Ctrl+N</span></div>
                        <div class="shortcut-item"><span>Buscar</span> <span class="shortcut-key">Ctrl+F</span></div>
                        <div class="shortcut-item"><span>Dashboard</span> <span class="shortcut-key">Ctrl+1</span></div>
                        <div class="shortcut-item"><span>Diário</span> <span class="shortcut-key">Ctrl+2</span></div>
                        <div class="shortcut-item"><span>Pacientes</span> <span class="shortcut-key">Ctrl+3</span></div>
                        <div class="shortcut-item"><span>Agenda</span> <span class="shortcut-key">Ctrl+4</span></div>
                        <div class="shortcut-item"><span>Relatórios</span> <span class="shortcut-key">Ctrl+5</span></div>
                    </div>
                </section>
            `;
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            Storage.checkVersion();
            renderApp();
            Theme.init();

            $("date").value = Utils.todayISO();
            $("schedRef").value = Utils.todayISO();
            $("cStartDate").value = Utils.todayISO();
            $("cEndDate").value = Utils.addDays(Utils.todayISO(), 30);
            
            $("today").innerHTML = new Date().toLocaleDateString("pt-BR", {
                weekday: "long", year: "numeric", month: "long", day: "numeric"
            });

            Tokens.verificarZerarMensal();
            Notifications.init();

            $("importFile")?.addEventListener('change', (e) => {
                Storage.importFromFile(e.target.files[0], () => location.reload());
            });

            PWA.init();
            Shortcuts.init();
            Tabs.init();

            $("cancelNotification")?.addEventListener("click", () => $("notificationModal")?.classList.add("hidden"));
            $("enableNotifications")?.addEventListener("click", Notifications.requestPermission);
            $("closeAnamnese")?.addEventListener("click", Modals.closeAnamnese);
            $("saveAnamnese")?.addEventListener("click", Modals.saveAnamnese);
            $("cancelToken")?.addEventListener("click", Modals.closeToken);
            $("saveToken")?.addEventListener("click", TokenActions.saveToken);
            $("closeManualToken")?.addEventListener("click", Modals.closeManualToken);
            $("addManualToken")?.addEventListener("click", TokenActions.addManual);
            $("cancelEvolucao")?.addEventListener("click", EvolucaoActions.closeModal);
            $("saveEvolucao")?.addEventListener("click", EvolucaoActions.save);
            $("cancelEditEvolucao")?.addEventListener("click", EvolucaoActions.closeEditModal);
            $("saveEditEvolucao")?.addEventListener("click", EvolucaoActions.saveEdit);

            DailyView.renderPatientSelect();
            DailyView.render();
            PatientsView.renderFolders();
            ScheduleView.render();
            DashboardView.render();
            ReportsView.generate();

            setTimeout(() => ScheduleForm.updateDays(), 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
